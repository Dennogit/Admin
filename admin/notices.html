<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Notices</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', Arial, sans-serif;
        }
        
        body {
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 5px;
        }
        
        .container {
            background-color: #e0e0e0;
            border-radius: 10px;
            width: 100%;
            max-width: 800px;
            padding: 2px;
            box-shadow: 0 4px 8px#5a1f1f(0, 0, 0, 0.2);
            height: 80vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .add-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .add-btn:hover {
            background-color: #3e8e41;
        }
        
        .search-container {
            display: flex;
            align-items: center;
        }
        
        .search-container input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
            border-right: none;
        }
        
        .search-btn {
            background-color: white;
            border: 1px solid #ddd;
            border-left: none;
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f2f2f2;
            color: #333;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: #5c85d6;
            cursor: pointer;
            font-size: 18px;
        }
        
        .delete-btn:hover {
            color: #f44336;
        }
        
        /* Responsive styles */
        @media screen and (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .controls {
                width: 100%;
                justify-content: space-between;
            }
            
            table {
                font-size: 14px;
            }
            
            th, td {
                padding: 8px 10px;
            }
            
            .container {
                padding: 15px;
            }
            
            .search-container input {
                width: 120px;
            }
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(109, 26, 26, 0.4);
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: #fefefe;
            padding: 20px;
            border-radius: 5px;
            width: 80%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .submit-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Recent notices</h1>
            <div class="controls">
                <button class="add-btn" id="addNoticeBtn">
                    <i class="fas fa-plus"></i> Add notice
                </button>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search">
                    <button class="search-btn" id="searchBtn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <table id="noticesTable">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Owner</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Exams</td>
                    <td>11-03-2025 10:00am</td>
                    <td>Dean of Students</td>
                    <td><button class="delete-btn"><i class="fas fa-trash"></i></button></td>
                </tr>
                <tr>
                    <td>Handover</td>
                    <td>11-03-2025 10:30am</td>
                    <td>Dean of students</td>
                    <td><button class="delete-btn"><i class="fas fa-trash"></i></button></td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <!-- Add Notice Modal -->
    <div id="addNoticeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Notice</h2>
                <span class="close">&times;</span>
            </div>
            <form id="noticeForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="date">Date and Time</label>
                    <input type="datetime-local" id="date" required>
                </div>
                <div class="form-group">
                    <label for="owner">To</label>
                    <select id="owner" required>
                        <option value="" disabled selected>Select recipient</option>
                        <option value="Staff">Staff</option>
                        <option value="Student">Student</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="file" id="myFile" name="filename">
                    <input type="submit">
                    <label for="myFile">Upload File</label>
                </div>
                
                <button type="submit" class="submit-btn">Add Notice</button>
            </form>
        </div>
    </div>

    <script>
        // Current notices data
        let notices = [
            { title: "Exams", date: "11-03-2025 10:00am", owner: "Dean of Students" },
            { title: "Handover", date: "11-03-2025 10:30am", owner: "Dean of students" }
        ];
        
        // DOM elements
        const noticesTable = document.getElementById('noticesTable');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const addNoticeBtn = document.getElementById('addNoticeBtn');
        const modal = document.getElementById('addNoticeModal');
        const closeBtn = document.querySelector('.close');
        const noticeForm = document.getElementById('noticeForm');
        
        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${day}-${month}-${year} ${hours}:${minutes}am`;
        }
        
        // Render notices table
        function renderNotices(noticesList) {
            const tbody = noticesTable.querySelector('tbody');
            tbody.innerHTML = '';
            
            noticesList.forEach(notice => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${notice.title}</td>
                    <td>${notice.date}</td>
                    <td>${notice.owner}</td>
                    <td><button class="delete-btn"><i class="fas fa-trash"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
            
            // Add event listeners to delete buttons
            document.querySelectorAll('.delete-btn').forEach((btn, index) => {
                btn.addEventListener('click', () => deleteNotice(index));
            });
        }
        
        // Delete notice
        function deleteNotice(index) {
            if (confirm('Are you sure you want to delete this notice?')) {
                notices.splice(index, 1);
                renderNotices(notices);
            }
        }
        
        // Search notices
        function searchNotices() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredNotices = notices.filter(notice => 
                notice.title.toLowerCase().includes(searchTerm) || 
                notice.owner.toLowerCase().includes(searchTerm)
            );
            renderNotices(filteredNotices);
        }
        
        // Open modal
        addNoticeBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
        });
        
        // Close modal
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        
        // Close modal when clicking outside
        window.addEventListener('click', (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });
        
        // Add new notice
        noticeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const dateInput = document.getElementById('date').value;
            const owner = document.getElementById('owner').value;
            
            // Format date for display
            const formattedDate = formatDate(dateInput);
            
            // Add new notice to array
            notices.push({
                title: title,
                date: formattedDate,
                owner: owner
            });
            
            // Render updated notices
            renderNotices(notices);
            
            // Reset form and close modal
            noticeForm.reset();
            modal.style.display = 'none';
        });
        
        // Search on button click
        searchBtn.addEventListener('click', searchNotices);
        
        // Search on enter key
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                searchNotices();
            }
        });
        
        // Initial render
        renderNotices(notices);
    </script>
</body>
</html>
