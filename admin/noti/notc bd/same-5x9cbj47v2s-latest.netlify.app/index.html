<!DOCTYPE html>
<html lang="en">

<!-- Mirrored from same-5x9cbj47v2s-latest.netlify.app/ by HTTrack Website Copier/3.x [XR&CO'2014], Mon, 07 Jul 2025 14:49:07 GMT -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="../cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <h2 class="sidebar-title">Categories</h2>
            <div class="nav-buttons">
                <button class="nav-btn active" data-category="students">
                    <i class="fas fa-graduation-cap"></i>
                    Students
                </button>
                <button class="nav-btn" data-category="stuff">
                    <i class="fas fa-box"></i>
                    Stuff
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Header with search and notification -->
            <div class="header">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search students...">
                    <i class="fas fa-search search-icon"></i>
                </div>
                <div class="notification-bell">
                    <i class="fas fa-bell"></i>
                </div>
            </div>

            <!-- Page Title -->
            <h1 class="page-title">Students</h1>

            <!-- Recent Posts Section -->
            <div class="recent-posts-section">
                <div class="section-header">
                    <h3 class="section-title">Recent posts</h3>
                    <a href="#" class="view-all-link">View all <i class="fas fa-chevron-right"></i></a>
                </div>

                <!-- Posts Grid -->
                <div class="posts-grid">
                    <!-- Post 1 - Register Admissions -->
                    <div class="post-card">
                        <div class="post-image">
                            <img src="../i.pinimg.com/736x/fe/e8/d7/fee8d7bf21002f104adc21dd78139e6b.jpg" alt="Register Admissions">
                            <div class="post-overlay">
                                <div class="post-content">
                                    <h4 class="post-title">Register<br>Admissions</h4>
                                    <p class="post-subtitle">Invest into your future<br>Learn UHU</p>
                                </div>
                            </div>
                        </div>
                        <div class="post-footer">
                            <a href="#" class="view-details-btn">View details</a>
                        </div>
                    </div>

                    <!-- Post 2 - Sports Tutor -->
                    <div class="post-card">
                        <div class="post-image">
                            <img src="../southstinger.com/wp-content/uploads/2020/08/Brazil_mens_football_team_2016_Olympics-900x599.jpg" alt="Sports Team">
                            <div class="post-overlay">
                                <div class="post-content">
                                    <h4 class="post-title">Sports tutor<br>League match</h4>
                                </div>
                            </div>
                        </div>
                        <div class="post-footer">
                            <a href="#" class="view-details-btn">View details</a>
                        </div>
                    </div>

                    <!-- Post 3 - Graduation -->
                    <div class="post-card">
                        <div class="post-image">
                            <img src="../www.pace.edu/sites/default/files/styles/16_9_1600x900/public/2023-02/commencement-interior-hero-ceremonyd6eb.jpg?h=993b43e0&amp;itok=1QMHrqV6" alt="Graduation Ceremony">
                            <div class="post-overlay">
                                <div class="post-content">
                                    <h4 class="post-title">Graduation<br>Ceremony</h4>
                                </div>
                            </div>
                        </div>
                        <div class="post-footer">
                            <a href="#" class="view-details-btn">View details</a>
                        </div>
                    </div>

                    <!-- Post 4 - Campus Dining -->
                    <div class="post-card">
                        <div class="post-image">
                            <img src="../www.sandiego.edu/dining/images/site-banner-1.jpg" alt="Campus Dining">
                            <div class="post-overlay">
                                <div class="post-content">
                                    <h4 class="post-title">Campus<br>Dining</h4>
                                </div>
                            </div>
                        </div>
                        <div class="post-footer">
                            <a href="#" class="view-details-btn">View details</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Add Button -->
    <div class="floating-add-btn" onclick="showAddDialog()">
        <i class="fas fa-plus"></i>
    </div>

    <script src="script.js"></script>
</body>
