<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notice Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="noti.css" />
  <script defer src="script.js"></script>
  <script src="https://kit.fontawesome.com/a2e0f1f72f.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>Categories</h2>
      <button class="category-btn active" data-category="students">Students</button>
      <button class="category-btn" data-category="staff">Staff</button>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div class="search-box">
          <input type="text" placeholder="Search notices" id="searchInput" />
          <i class="fas fa-search"></i>
        </div>
        <div class="bell-icon">
          <i class="far fa-bell"></i>
        </div>
      </div>

      <h1>Students</h1>

      <div class="section-header">
        <h2>Recent posts</h2>
        <a href="#" class="view-all">View all <i class="fas fa-arrow-right"></i></a>
      </div>

      <div class="cards" id="noticesContainer">
        <!-- JS inserts cards here -->
      </div>

      <button class="add-button"><i class="fas fa-plus"></i></button>
    </main>
  </div>
</body>
</html>
